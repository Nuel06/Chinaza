<title>Chinaza | Hand-Crocheted Slow Fashion</title>

<style>
  :root {
    --cream: #F6F0EA;
    --taupe: #D8C9BC;
    --chocolate: #362D1D;
    --chocolate-2: #4A3B26;
    --radius: 10px;
    --transition: all 0.4s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--chocolate);
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  /* ---------- ANNOUNCEMENT BAR ---------- */
  .announce {
    position: relative;
    background: var(--taupe);
    color: var(--chocolate);
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 44px;
  }
  .announce-close {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--chocolate);
    opacity: 0.6;
    display: flex;
    align-items: center;
  }
  .announce-close:hover { opacity: 1; }
  .announce-close svg { width: 13px; height: 13px; }
  .announce.is-hidden { display: none; }

  /* ---------- HERO : full-bleed photo frame with overlaid header + title ---------- */
  .hero {
    position: relative;
    min-height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
